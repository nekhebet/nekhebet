[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nekhebet-core"
version = "4.0.0"
description = "Nekhebet Core — canonical signed event system"
requires-python = ">=3.10"

dependencies = [
    "msgspec>=0.18",
    "cryptography>=42.0.0",  # Добавлена обязательная зависимость для Ed25519
]

# =============================================================================
# mypy configuration
# =============================================================================

[tool.mypy]
python_version = "3.11"
strict = true

# IMPORTANT:
# mypy is run against the *package root*, not repo root
files = ["packages/nekhebet-core"]

# msgspec has incomplete / no stubs
[[tool.mypy.overrides]]
module = ["msgspec.*"]
ignore_missing_imports = true

# cryptography has no official stubs — используем рекурсивный паттерн для всех подмодулей
[[tool.mypy.overrides]]
module = "cryptography.**"
ignore_missing_imports = true

# msgspec.Struct uses __init_subclass__ tricks
# mypy cannot type-check these correctly
[[tool.mypy.overrides]]
module = [
    "nekhebet_core.types",
    "nekhebet_core.config",
]
disable_error_code = ["call-arg"]

# =============================================================================
# setuptools
# =============================================================================

[tool.setuptools.packages.find]
where = ["."]
