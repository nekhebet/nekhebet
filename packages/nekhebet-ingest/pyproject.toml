[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nekhebet-ingest"
version = "4.0.0"
description = "Nekhebet ingest pipeline (Telegram, future sources)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }

dependencies = [
    "telethon>=1.34",
    "python-dotenv>=1.0",
    "psycopg2-binary>=2.9",
    "cryptography>=42.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[project.scripts]
nekhebet-telegram = "nekhebet_ingest.telegram.run:main"

[tool.setuptools]
package-dir = { "" = "." }

[tool.setuptools.packages.find]
where = ["."]
include = ["nekhebet_ingest*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["nekhebet_ingest"]

# ==================== MYPY CONFIG ====================
[tool.mypy]
python_version = "3.11"
strict = false

ignore_missing_imports = true

disable_error_code = ["arg-type"]

