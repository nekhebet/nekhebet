[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nekhebet-store"
version = "4.0.0"
description = "Nekhebet storage adapter"
requires-python = ">=3.10"

dependencies = [
    "nekhebet-core>=4.0.0",
    "psycopg2-binary>=2.9",
    "lmdb>=1.4.1",
]

# =============================================================================
# mypy configuration
# =============================================================================

[tool.mypy]
python_version = "3.11"
strict = true
files = ["nekhebet_store"]
exclude = ["tests", "test_.*", ".*tests.*"]  # Добавьте исключение тестов

# Настройка пространства имен
namespace_packages = true

# Игнорировать ошибки импорта для nekhebet-core во время проверки
ignore_missing_imports = false
follow_imports = "normal"

# Настройки для некорректных типов
[[tool.mypy.overrides]]
module = "lmdb.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "nekhebet_core.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "psycopg2.*"
ignore_missing_imports = true

# =============================================================================
# setuptools
# =============================================================================

[tool.setuptools.packages.find]
where = ["."]
include = ["nekhebet_store*"]
