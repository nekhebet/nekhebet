[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nekhebet-store"
version = "4.0.0"
description = "Nekhebet storage adapter"
requires-python = ">=3.10"

dependencies = [
    "nekhebet-core>=4.0.0",
    "psycopg2-binary>=2.9",
    "lmdb>=1.4.1",
]

# =============================================================================
# mypy configuration
# =============================================================================

[tool.mypy]
python_version = "3.11"
strict = true
files = ["nekhebet_store"]   

# lmdb не имеет stubs
[[tool.mypy.overrides]]
module = "lmdb.*"
ignore_missing_imports = true

# =============================================================================
# setuptools
# =============================================================================

[tool.setuptools.packages.find]
where = ["."]
include = ["nekhebet_store*"]
