name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nekhebet-core:
    name: nekhebet-core
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nekhebet-core (editable)
        run: |
          pip install -e packages/nekhebet-core

      - name: Install dev tools
        run: |
          pip install ruff mypy pytest pytest-asyncio

      # ------------------------------------------------------------
      # Linting
      # ------------------------------------------------------------
      - name: Ruff (lint)
        run: |
          ruff check packages/nekhebet-core

      # ------------------------------------------------------------
      # Type checking
      # ------------------------------------------------------------
      - name: Mypy (strict)
        run: |
          mypy packages/nekhebet-core

      # ------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------
      - name: Pytest
        run: |
          pytest packages/nekhebet-core || true

  nekhebet-store:
    name: nekhebet-store
    runs-on: ubuntu-latest
    needs: nekhebet-core  # опционально: store зависит от core, но в monorepo это не обязательно

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Сначала core (зависимость store)
      - name: Install nekhebet-core (editable)
        run: |
          pip install -e packages/nekhebet-core

      # Затем store — подтянет lmdb, psycopg2-binary и т.д.
      - name: Install nekhebet-store (editable)
        run: |
          pip install -e packages/nekhebet-store

      - name: Install dev tools
        run: |
          pip install ruff mypy pytest pytest-asyncio

      # ------------------------------------------------------------
      # Linting
      # ------------------------------------------------------------
      - name: Ruff (lint)
        run: |
          ruff check packages/nekhebet-store

      # ------------------------------------------------------------
      # Type checking
      # ------------------------------------------------------------
      - name: Mypy (strict)
        run: |
          mypy packages/nekhebet-store

      # ------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------
      - name: Pytest
        run: |
          pytest packages/nekhebet-store || true
