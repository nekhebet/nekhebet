name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nekhebet-core:
    name: nekhebet-core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nekhebet-core (editable)
        run: |
          pip install -e packages/nekhebet-core

      - name: Install dev tools
        run: |
          pip install ruff mypy pytest pytest-asyncio

      - name: Ruff (lint)
        run: |
          ruff check packages/nekhebet-core

      - name: Mypy (strict)
        run: |
          mypy packages/nekhebet-core

      - name: Pytest
        run: |
          pytest packages/nekhebet-core || true

  nekhebet-store:
    name: nekhebet-store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nekhebet-core (editable)
        run: |
          pip install -e packages/nekhebet-core

      - name: Install nekhebet-store (editable)
        run: |
          pip install -e packages/nekhebet-store

      - name: Install dev tools
        run: |
          pip install ruff mypy pytest pytest-asyncio types-psycopg2

      - name: Ruff (lint)
        run: |
          ruff check packages/nekhebet-store

      - name: Mypy (strict)
        run: |
          mypy nekhebet_store   # имя установленного пакета, а не путь к директории

      - name: Pytest
        run: |
          pytest packages/nekhebet-store || true
