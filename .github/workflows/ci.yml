name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nekhebet-core:
    name: nekhebet-core
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nekhebet-core (editable)
        run: |
          pip install -e packages/nekhebet-core

      - name: Install dev tools
        run: |
          pip install ruff mypy pytest pytest-asyncio

      # ------------------------------------------------------------
      # Linting
      # ------------------------------------------------------------
      - name: Ruff (lint)
        run: |
          ruff check packages/nekhebet-core

      # ------------------------------------------------------------
      # Type checking
      # ------------------------------------------------------------
      - name: Mypy (strict)
        run: |
          mypy packages/nekhebet-core

      # ------------------------------------------------------------
      # Tests (if/when added)
      # ------------------------------------------------------------
      - name: Pytest
        run: |
          pytest packages/nekhebet-core
