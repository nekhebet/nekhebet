name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core:
    name: nekhebet-core
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/nekhebet-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict)
        run: mypy nekhebet_core

      - name: Pytest
        run: pytest
