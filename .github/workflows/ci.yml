name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nekhebet-core:
    name: nekhebet-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('packages/**/pyproject.toml') }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install nekhebet-core (editable) + dev tools
        run: |
          pip install -e packages/nekhebet-core
          pip install ruff mypy pytest pytest-asyncio

      - name: Ruff (lint)
        run: |
          cd packages/nekhebet-core
          ruff check .

      - name: Mypy (strict)
        run: |
          cd packages/nekhebet-core
          mypy .

      - name: Pytest
        run: |
          cd packages/nekhebet-core
          pytest .

  nekhebet-store:
    name: nekhebet-store
    runs-on: ubuntu-latest
    needs: nekhebet-core  # Ensure core job passes first
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('packages/**/pyproject.toml') }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies + dev tools
        run: |
          pip install -e packages/nekhebet-core
          pip install -e packages/nekhebet-store
          pip install ruff mypy pytest pytest-asyncio types-psycopg2

      - name: Ruff (lint)
        run: |
          cd packages/nekhebet-store
          ruff check .

      - name: Mypy (strict)
        run: |
          cd packages/nekhebet-store
          mypy .

      - name: Pytest
        run: |
          cd packages/nekhebet-store
          pytest .
